name: Weekly Groww Review Analysis

on:
  schedule:
    # Run every Monday at 3:30 AM UTC (9:00 AM IST)
    - cron: '30 3 * * 1'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI
    inputs:
      review_count:
        description: 'Number of reviews to scrape'
        required: false
        default: '500'
      skip_scrape:
        description: 'Skip scraping (use existing data)'
        required: false
        default: 'false'

jobs:
  analyze-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
      TARGET_DOC_ID: ${{ secrets.TARGET_DOC_ID }}
      TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      REVIEW_COUNT: ${{ github.event.inputs.review_count || '500' }}
      SKIP_SCRAPE: ${{ github.event.inputs.skip_scrape || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-play-scraper groq

      - name: Run scheduled pipeline
        run: python scheduled_run.py

      - name: Upload scraped data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-data-${{ github.run_number }}
          path: phase1_ingestion/data/
          retention-days: 30
